<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إدارة الطلاب - جيل الإبداع</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<!-- مكتبات Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<style>
body { font-family: 'Tajawal', sans-serif; background: #f4f4f4; padding: 20px; direction: rtl; }
.admin-panel { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
h2 { color: #2c3e50; text-align: center; }
input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
.btn-save { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
.btn-save:hover { background: #219150; }
</style>
</head>
<body>

<div class="admin-panel">
<h2>تحديث بيانات طالب</h2>
<input type="number" id="sID" placeholder="رقم هوية الطالب (مفتاح البحث)">
<input type="text" id="sName" placeholder="اسم الطالب">
<input type="text" id="sGrade" placeholder="الصف الدراسي">
<select id="sFees">
<option value="مسدد">مسدد</option>
<option value="غير مسدد">غير مسدد</option>
</select>
<textarea id="sNotes" placeholder="ملاحظات الإدارة"></textarea>
<button class="btn-save" onclick="uploadData()">حفظ البيانات في السحابة</button>
</div>

<script>
// ضع إعدادات Firebase الخاصة بك هنا
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_PROJECT.appspot.com",
messagingSenderId: "YOUR_ID",
appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function uploadData() {
const id = document.getElementById('sID').value;
const name = document.getElementById('sName').value;
const grade = document.getElementById('sGrade').value;
const fees = document.getElementById('sFees').value;
const notes = document.getElementById('sNotes').value;

if(!id || !name) { alert("يرجى ملء البيانات الأساسية"); return; }

try {
await db.collection("students").doc(id).set({
name: name,
grade: grade,
fees: fees,
notes: notes,
lastUpdate: firebase.firestore.FieldValue.serverTimestamp()
});
alert("تم التحديث بنجاح! البيانات الآن متاحة لكل الأجهزة.");
} catch (error) {
console.error(error);
alert("حدث خطأ أثناء الحفظ.");
}
}
</script>
</body>
</html>
