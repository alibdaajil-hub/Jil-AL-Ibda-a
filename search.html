<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استعلام عن طالب - جيل الإبداع</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root { --primary: #2c3e50; --search-gold: #f39c12; }
* { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
body { background: #d1d1d1; display: flex; justify-content: center; padding: 20px 0; min-height: 100vh; }
.app-container { width: 100%; max-width: 450px; background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
header { background: var(--search-gold); color: white; padding: 30px 20px; text-align: center; }
.back-btn { float: right; color: white; text-decoration: none; font-size: 0.8rem; background: rgba(0,0,0,0.1); padding: 5px 10px; border-radius: 5px; }
.search-body { padding: 25px; flex-grow: 1; }
.input-group { margin-bottom: 20px; }
label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--primary); }
input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 1.1rem; text-align: center; outline: none; }
input:focus { border-color: var(--search-gold); }
.btn-search { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }

/* منطقة عرض النتيجة */
.result-card { display: none; margin-top: 25px; padding: 20px; border-radius: 15px; background: #f9f9f9; border: 1px solid #eee; animation: fadeIn 0.5s; }
.result-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
.result-item:last-child { border-bottom: none; }
.label-text { color: #777; font-size: 0.9rem; }
.value-text { font-weight: bold; color: var(--primary); }
.status-paid { color: #27ae60; }
.status-unpaid { color: #c0392b; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="app-container">
<header>
<a href="index.html" class="back-btn">رجوع</a>
<h2>استعلام عن طالب</h2>
<p>أدخل رقم الهوية لمتابعة الحالة</p>
</header>

<main class="search-body">
<div class="input-group">
<label>رقم هوية الطالب</label>
<input type="number" id="searchID" placeholder="10 أرقام">
</div>
<button class="btn-search" onclick="performSearch()">بحث الآن</button>

<!-- النتيجة (تظهر عند البحث) -->
<div id="resultArea" class="result-card">
<div style="text-align: center; margin-bottom: 15px;">
<span style="font-size: 3rem;">🎓</span>
</div>
<div class="result-item">
<span class="label-text">اسم الطالب:</span>
<span class="value-text" id="resName">محمد أحمد علي</span>
</div>
<div class="result-item">
<span class="label-text">الصف الدراسي:</span>
<span class="value-text" id="resClass">السادس ابتدائي</span>
</div>
<div class="result-item">
<span class="label-text">حالة الرسوم:</span>
<span class="value-text status-paid" id="resFees">مسدد</span>
</div>
<div class="result-item">
<span class="label-text">ملاحظات الإدارة:</span>
<span class="value-text" id="resNotes">ممتاز ومجتهد</span>
</div>
</div>
</main>
</div>

<script>
function performSearch() {
const id = document.getElementById('searchID').value;
const resultArea = document.getElementById('resultArea');

if(id.length < 5) {
alert("يرجى إدخال رقم هوية صحيح");
return;
}

// ملاحظة برمجية: هنا يتم استدعاء البيانات من قاعدة البيانات
// سنقوم بإظهار نتيجة تجريبية الآن
resultArea.style.display = "block";
}
</script>

</body>
</html>
