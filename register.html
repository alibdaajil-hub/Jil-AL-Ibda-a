<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل طالب جديد - جيل الإبداع</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root { --primary: #2c3e50; --green: #27ae60; --gold: #f39c12; }
* { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
body { background: #d1d1d1; display: flex; justify-content: center; padding: 20px 0; }
.app-container { width: 100%; max-width: 480px; background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
header { background: var(--primary); color: white; padding: 20px; text-align: center; }
.logo-small { width: 60px; margin-bottom: 10px; border-radius: 50%; }
.form-body { padding: 20px; }
.section-title { background: #f8f9fa; padding: 8px; border-right: 4px solid var(--gold); margin: 15px 0; font-weight: bold; color: var(--primary); }
.input-group { margin-bottom: 12px; }
label { display: block; font-size: 0.85rem; margin-bottom: 5px; font-weight: bold; }
input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; outline: none; transition: 0.3s; }
input:focus, select:focus { border-color: var(--gold); box-shadow: 0 0 5px rgba(243, 156, 18, 0.2); }
.fee-alert { display: none; background: #fff3cd; color: #856404; padding: 10px; border-radius: 8px; margin-top: 5px; font-size: 0.85rem; border: 1px solid #ffeeba; border-right: 4px solid #f39c12; }
.btn-submit { width: 100%; background: var(--green); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
.btn-submit:hover { background: #219150; }
.btn-submit:active { transform: scale(0.95); }
</style>
</head>
<body>

<div class="app-container">
<header>
<img src="logo.png" alt="شعار المدرسة" class="logo-small" onerror="this.style.display='none'">
<h2>استمارة تسجيل طالب</h2>
<p>مدرسة جيل الإبداع الأهلية</p>
</header>

<!-- قمت بإضافة ID للنموذج للتحكم به برمجياً -->
<form id="registrationForm" class="form-body" action="https://formspree.io/f/xgodedgy" method="POST">

<div class="section-title">البيانات الدراسية</div>
<div class="input-group">
<label>المرحلة الدراسية</label>
<select id="stage" name="المرحلة" onchange="updateClasses()" required>
<option value="">اختر المرحلة</option>
<option value="kg">رياض أطفال</option>
<option value="primary">ابتدائي</option>
<option value="middle">متوسط</option>
</select>
</div>
<div class="input-group">
<label>الصف الدراسي</label>
<select id="classSelect" name="الصف" onchange="checkSpecialFees()" required>
<option value="">اختر المرحلة أولاً</option>
</select>
<div id="feeAlert" class="fee-alert">💡 ملاحظة: رسوم هذا الصف (شهادة) هي 2500 ريال.</div>
</div>

<div class="section-title">بيانات الطالب الشخصية</div>
<div class="input-group">
<label>اسم الطالب الرباعي</label>
<input type="text" id="studentName" name="اسم الطالب" placeholder="كما هو في الهوية" required>
</div>
<div class="input-group">
<label>رقم حدود الطالب / الإقامة</label>
<input type="number" id="studentID" name="رقم الحدود" placeholder="10 أرقام" required>
</div>
<div class="input-group">
<label>المدرسة السابقة</label>
<input type="text" id="prevSchool" name="المدرسة السابقة" placeholder="اسم آخر مدرسة (إن وجد)">
</div>

<div class="section-title">بيانات التواصل والسكن</div>
<div class="input-group">
<label>رقم هاتف ولي الأمر (واتساب)</label>
<input type="tel" id="parentPhone" name="هاتف ولي الأمر" placeholder="05xxxxxxxx" required>
</div>
<div class="input-group">
<label>عنوان السكن</label>
<input type="text" id="address" name="السكن" placeholder="الحي - الشارع" required>
</div>
<div class="input-group">
<label>جهة عمل ولي الأمر</label>
<input type="text" id="workPlace" name="جهة العمل" placeholder="اختياري">
</div>

<div class="section-title">معلومات إضافية</div>
<div class="input-group">
<label>رقم الحافلة / الترحيل</label>
<input type="text" id="busNumber" name="رقم الترحيل" placeholder="إذا لم يكن الطالب مشتركاً في الباص">
</div>
<div class="input-group">
<label>الحالة الصحية</label>
<textarea id="healthStatus" name="الحالة الصحية" rows="2" placeholder="اذكر أي أمراض أو حساسية إن وجدت"></textarea>
</div>

<input type="hidden" name="_subject" value="تسجيل طالب جديد - جيل الإبداع">

<button type="submit" class="btn-submit">تأكيد وإرسال البيانات</button>
</form>
</div>

<!-- كود Firebase المدمج -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDuotSqXkOwPrWIAxNC7KCqWlyYonsUIBA",
authDomain: "jil-al-ibda-a.firebaseapp.com",
projectId: "jil-al-ibda-a",
storageBucket: "jil-al-ibda-a.firebasestorage.app",
messagingSenderId: "1057703586286",
appId: "1:1057703586286:web:e581aa576eef32930746ff",
measurementId: "G-TSG3J0BCSE"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.getElementById('registrationForm');
form.addEventListener('submit', async (e) => {
// سنقوم بحفظ البيانات في Firestore أولاً قبل إرسال Formspree
try {
await addDoc(collection(db, "students"), {
stage: document.getElementById('stage').value,
class: document.getElementById('classSelect').value,
studentName: document.getElementById('studentName').value,
nationalID: document.getElementById('studentID').value,
previousSchool: document.getElementById('prevSchool').value,
parentPhone: document.getElementById('parentPhone').value,
address: document.getElementById('address').value,
workPlace: document.getElementById('workPlace').value,
busNumber: document.getElementById('busNumber').value,
healthStatus: document.getElementById('healthStatus').value,
timestamp: new Date()
});
console.log("تمت بنجاح مزامنة البيانات مع Firestore");
} catch (error) {
console.error("خطأ في المزامنة: ", error);
}
// بعد محاولة الحفظ، سيستمر النموذج في الإرسال لـ Formspree تلقائياً
});
</script>

<script>
// الأكواد الوظيفية الخاصة بك (تحديث الصفوف وتنبيه الرسوم)
const classData = {
kg: ["مستوى أول", "مستوى ثاني"],
primary: ["الأول", "الثاني", "الثالث", "الرابع", "الخامس", "السادس (شهادة)"],
middle: ["الأول متوسط", "الثاني متوسط", "الثالث متوسط (شهادة)"]
};

function updateClasses() {
const stage = document.getElementById('stage').value;
const classSelect = document.getElementById('classSelect');
classSelect.innerHTML = '<option value="">اختر الصف</option>';
if (stage) {
classData[stage].forEach(c => {
let opt = document.createElement('option');
opt.value = c; opt.innerText = c;
classSelect.appendChild(opt);
});
}
}

function checkSpecialFees() {
const val = document.getElementById('classSelect').value;
const alert = document.getElementById('feeAlert');
alert.style.display = val.includes("(شهادة)") ? "block" : "none";
}
</script>

</body>
</html>
