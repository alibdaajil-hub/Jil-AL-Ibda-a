<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدرسة جيل الإبداع - استعلام عن طالب</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
--primary-bg: #2c3e50;
--accent-color: #f39c12; /* اللون البرتقالي المعتمد للاستعلام */
--text-main: #333;
}

* {
box-sizing: border-box;
margin: 0;
padding: 0;
font-family: 'Tajawal', sans-serif;
}

body {
background-color: #d1d1d1;
display: flex;
justify-content: center;
min-height: 100vh;
}

.app-container {
width: 100%;
max-width: 450px;
background-color: #ffffff;
display: flex;
flex-direction: column;
box-shadow: 0 10px 30px rgba(0,0,0,0.2);
position: relative;
}

header {
background: var(--primary-bg);
color: white;
padding: 30px 20px;
text-align: center;
border-bottom-left-radius: 30px;
border-bottom-right-radius: 30px;
}

.back-btn {
position: absolute;
top: 20px;
right: 20px;
color: white;
text-decoration: none;
font-size: 1.2rem;
}

.search-section {
padding: 30px 20px;
flex-grow: 1;
}

.input-group {
margin-bottom: 20px;
}

.input-group label {
display: block;
margin-bottom: 8px;
font-weight: bold;
color: var(--primary-bg);
}

.input-group input {
width: 100%;
padding: 15px;
border: 2px solid #eee;
border-radius: 12px;
outline: none;
transition: 0.3s;
text-align: center;
font-size: 1.1rem;
}

.input-group input:focus {
border-color: var(--accent-color);
}

.btn-search {
width: 100%;
padding: 15px;
background-color: var(--accent-color);
color: white;
border: none;
border-radius: 12px;
font-size: 1.1rem;
font-weight: bold;
cursor: pointer;
transition: 0.3s;
}

.btn-search:active {
transform: scale(0.98);
}

/* منطقة عرض النتائج */
#resultArea {
margin-top: 25px;
display: none; /* مخفي افتراضياً */
padding: 20px;
border-radius: 15px;
background: #f9f9f9;
border: 1px solid #ddd;
}

.result-item {
display: flex;
justify-content: space-between;
margin-bottom: 10px;
border-bottom: 1px dashed #ccc;
padding-bottom: 5px;
}

.result-label { font-weight: bold; color: #7f8c8d; }
.result-value { color: var(--primary-bg); font-weight: bold; }

footer {
padding: 15px;
text-align: center;
font-size: 0.8rem;
color: #777;
background: #f1f1f1;
}
</style>
</head>
<body>

<div class="app-container">
<header>
<a href="index.html" class="back-btn">🔙</a>
<h2>استعلام عن طالب</h2>
<p style="font-size: 0.8rem; margin-top: 5px; opacity: 0.9;">أدخل البيانات المطلوبة لعرض حالة الطالب</p>
</header>

<main class="search-section">
<div class="input-group">
<label>رقم الهوية / السجل المدني</label>
<input type="number" id="studentID" placeholder="مثال: 1234567890">
</div>

<button class="btn-search" onclick="performSearch()">بحث الآن 🔍</button>

<!-- منطقة ظهور النتيجة -->
<div id="resultArea">
<h3 style="text-align:center; color: var(--accent-color); margin-bottom: 15px;">بيانات الطالب</h3>
<div id="studentData">
<!-- سيتم تعبئة البيانات هنا بواسطة JavaScript -->
</div>
</div>
</main>

<footer>
<p>مدرسة جيل الإبداع - قسم شؤون الطلاب</p>
</footer>
</div>

<script>
function performSearch() {
const id = document.getElementById('studentID').value;
const resultArea = document.getElementById('resultArea');
const studentData = document.getElementById('studentData');

if(id === "") {
alert("الرجاء إدخال رقم الهوية أولاً");
return;
}

// محاكاة لعملية البحث (هنا يمكنك الربط مع قاعدة بيانات لاحقاً)
// سنقوم هنا بعمل مثال لبيانات وهمية
if(id === "123") {
resultArea.style.display = "block";
studentData.innerHTML = `
<div class="result-item"><span class="result-label">الاسم:</span> <span class="result-value">أحمد محمد السوداني</span></div>
<div class="result-item"><span class="result-label">المرحلة:</span> <span class="result-value">ابتدائي - الصف الرابع</span></div>
<div class="result-item"><span class="result-label">حالة الرسوم:</span> <span class="result-value" style="color:green;">مسدد</span></div>
<div class="result-item"><span class="result-label">حالة القبول:</span> <span class="result-value">منتظم</span></div>
`;
} else {
resultArea.style.display = "block";
studentData.innerHTML = `<p style="color:red; text-align:center;">عذراً، لم يتم العثور على بيانات لهذا الرقم.</p>`;
}
}
</script>

</body>
</html>
