<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل طالب جديد - جيل الإبداع</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root { --primary: #2c3e50; --green: #27ae60; --gold: #f39c12; }
* { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
body { background: #d1d1d1; display: flex; justify-content: center; padding: 20px 0; }
.app-container { width: 100%; max-width: 480px; background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
header { background: var(--primary); color: white; padding: 20px; text-align: center; }
.form-body { padding: 20px; }
.section-title { background: #f8f9fa; padding: 8px; border-right: 4px solid var(--gold); margin: 15px 0; font-weight: bold; color: var(--primary); }
.input-group { margin-bottom: 12px; }
label { display: block; font-size: 0.85rem; margin-bottom: 5px; font-weight: bold; }
input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; }
.fee-alert { display: none; background: #fff3cd; color: #856404; padding: 10px; border-radius: 8px; margin-top: 5px; font-size: 0.85rem; border: 1px solid #ffeeba; }
.btn-submit { width: 100%; background: var(--green); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; }
</style>
</head>
<body>

<div class="app-container">
<header>
<h2>استمارة تسجيل طالب</h2>
<p>يرجى تعبئة البيانات بدقة</p>
</header>

<form class="form-body" id="registrationForm">
<!-- بيانات الطالب الأساسية -->
<div class="section-title">البيانات الدراسية</div>
<div class="input-group">
<label>المرحلة الدراسية</label>
<select id="stage" onchange="updateClasses()" required>
<option value="">اختر المرحلة</option>
<option value="kg">رياض أطفال</option>
<option value="primary">ابتدائي</option>
<option value="middle">متوسط</option>
</select>
</div>
<div class="input-group">
<label>الصف الدراسي</label>
<select id="classSelect" onchange="checkSpecialFees()" required>
<option value="">اختر المرحلة أولاً</option>
</select>
<div id="feeAlert" class="fee-alert">💡 ملاحظة: رسوم هذا الصف (شهادة) هي 2500 ريال.</div>
</div>

<div class="section-title">بيانات الطالب الشخصية</div>
<div class="input-group">
<label>اسم الطالب الرباعي</label>
<input type="text" placeholder="كما هو في الهوية" required>
</div>
<div class="input-group">
<label>رقم هوية الطالب / الإقامة</label>
<input type="number" placeholder="10 أرقام" required>
</div>
<div class="input-group">
<label>المدرسة السابقة</label>
<input type="text" placeholder="اسم آخر مدرسة التحق بها">
</div>
<div class="input-group">
<label>نتيجة العام السابق (%)</label>
<input type="text" placeholder="مثال: 95% أو ناجح">
</div>

<div class="section-title">بيانات ولي الأمر</div>
<div class="input-group">
<label>رقم هاتف ولي الأمر (واتساب)</label>
<input type="tel" placeholder="05xxxxxxxx" required>
</div>
<div class="input-group">
<label>عنوان السكن الحالي</label>
<input type="text" placeholder="المدينة - الحي" required>
</div>
<div class="input-group">
<label>جهة العمل</label>
<input type="text" placeholder="اسم الشركة أو المؤسسة">
</div>

<div class="section-title">بيانات إضافية</div>
<div class="input-group">
<label>رقم ترحيل الطالب (إن وجد)</label>
<input type="text" placeholder="اتركه فارغاً إذا لم يوجد">
</div>
<div class="input-group">
<label>الحالة الصحية والبدنية</label>
<textarea rows="2" placeholder="هل يعاني الطالب من أي أمراض أو حساسية؟"></textarea>
</div>

<button type="submit" class="btn-submit">إرسال طلب التسجيل</button>
</form>
</div>

<script>
const classData = {
kg: ["مستوى أول", "مستوى ثاني"],
primary: ["الأول", "الثاني", "الثالث", "الرابع", "الخامس", "السادس (شهادة)"],
middle: ["الأول متوسط", "الثاني متوسط", "الثالث متوسط (شهادة)"]
};

function updateClasses() {
const stage = document.getElementById('stage').value;
const classSelect = document.getElementById('classSelect');
classSelect.innerHTML = '<option value="">اختر الصف</option>';
if (stage) {
classData[stage].forEach(c => {
let opt = document.createElement('option');
opt.value = c; opt.innerText = c;
classSelect.appendChild(opt);
});
}
}

function checkSpecialFees() {
const val = document.getElementById('classSelect').value;
const alert = document.getElementById('feeAlert');
alert.style.display = val.includes("(شهادة)") ? "block" : "none";
}
</script>
</body>
</html>
