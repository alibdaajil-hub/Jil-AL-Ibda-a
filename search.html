<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استعلام عن بيانات طالب - جيل الإبداع</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root { --primary: #2c3e50; --gold: #f39c12; --bg: #d1d1d1; }
body { font-family: 'Tajawal', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
.search-card { width: 100%; max-width: 450px; background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
header { background: var(--primary); color: white; padding: 25px; text-align: center; }
.search-body { padding: 25px; }
.input-group { margin-bottom: 20px; }
label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--primary); }
input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 1rem; outline: none; transition: 0.3s; box-sizing: border-box; text-align: center; }
input:focus { border-color: var(--gold); }
.btn-search { width: 100%; background: var(--gold); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
.btn-search:hover { background: #e67e22; }

/* عرض النتيجة */
#resultArea { display: none; margin-top: 25px; border-top: 2px dashed #eee; padding-top: 20px; }
.result-item { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-right: 4px solid var(--primary); }
.result-label { font-size: 0.8rem; color: #777; margin-bottom: 5px; }
.result-value { font-weight: bold; color: var(--primary); font-size: 1.1rem; }
.status-tag { display: inline-block; padding: 5px 15px; border-radius: 20px; font-weight: bold; color: white; margin-top: 5px; }
</style>
</head>
<body>

<div class="search-card">
<header>
<h2>نظام الاستعلام الذكي</h2>
<p>مدرسة جيل الإبداع الأهلية</p>
</header>

<div class="search-body">
<div class="input-group">
<label>أدخل رقم الحدود</label>
<input type="text" id="searchInput" placeholder="مثال: محمد أحمد أو 2xxxxxxxx">
</div>
<button class="btn-search" onclick="performSearch()">استعلام الآن 🔍</button>

<!-- منطقة ظهور النتائج -->
<div id="resultArea">
<div class="result-item">
<div class="result-label">اسم الطالب</div>
<div id="resName" class="result-value">-</div>
</div>
<div class="result-item">
<div class="result-label">الصف الدراسي</div>
<div id="resGrade" class="result-value">-</div>
</div>
<div class="result-item">
<div class="result-label">حالة الرسوم الدراسية</div>
<div id="resStatus">-</div>
</div>
<div class="result-item">
<div class="result-label">ملاحظات الإدارة</div>
<div id="resNotes" class="result-value" style="font-size: 0.9rem;">-</div>
</div>
</div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDuotSqXkOwPrWIAxNC7KCqWlyYonsUIBA",
authDomain: "jil-al-ibda-a.firebaseapp.com",
projectId: "jil-al-ibda-a",
storageBucket: "jil-al-ibda-a.firebasestorage.app",
messagingSenderId: "1057703586286",
appId: "1:1057703586286:web:e581aa576eef32930746ff"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.performSearch = async function() {
const searchValue = document.getElementById('searchInput').value.trim();
const resultArea = document.getElementById('resultArea');
if(!searchValue) { alert("من فضلك أدخل الاسم أو رقم الحدود"); return; }

// البحث في مجموعة الطلاب
const studentsRef = collection(db, "students");
// سنقوم بمحاولة البحث بالاسم أو برقم الحدود (الذي خزنّاه سابقاً كمعرف أو كحقل)
let q;
if (!isNaN(searchValue)) {
// إذا كان المدخل رقماً، نبحث في رقم الهوية/الحدود
q = query(studentsRef, where("nationalID", "==", searchValue));
} else {
// إذا كان نصاً، نبحث في الاسم
q = query(studentsRef, where("studentName", "==", searchValue));
}

const querySnapshot = await getDocs(q);

if (!querySnapshot.empty) {
resultArea.style.display = "block";
querySnapshot.forEach((doc) => {
const data = doc.data();
document.getElementById('resName').innerText = data.studentName || data.fullName;
document.getElementById('resGrade').innerText = data.class || data.currentGrade;
document.getElementById('resNotes').innerText = data.adminNotes || "لا توجد ملاحظات حالياً";

// تنسيق حالة الرسوم
const statusBox = document.getElementById('resStatus');
const status = data.paymentStatus || "غير محدد";
statusBox.innerText = status;
statusBox.className = "status-tag";
statusBox.style.backgroundColor = (status === "مسدد") ? "#27ae60" : "#c0392b";
});
} else {
alert("عذراً، لم يتم العثور على بيانات بهذا الاسم أو الرقم. تأكد من صحة المدخلات.");
resultArea.style.display = "none";
}
};
</script>
</body>
</html>
