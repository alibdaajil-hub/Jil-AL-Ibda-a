<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تعديل بيانات الطالب - الإدارة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Tajawal', sans-serif; background: #f4f4f4; padding: 20px; direction: rtl; }
.admin-panel { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
h2 { color: #2c3e50; text-align: center; border-bottom: 2px solid #f39c12; padding-bottom: 10px; }
label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
.btn-save { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; font-size: 1.1rem; }
.btn-back { display: block; text-align: center; margin-top: 15px; color: #777; text-decoration: none; }
</style>
</head>
<body>

<div class="admin-panel">
<h2>تعديل بيانات الطالب ⚙️</h2>

<label>رقم الحدود / الهوية</label>
<input type="text" id="sID" readonly style="background: #eee;">

<label>اسم الطالب</label>
<input type="text" id="sName">

<label>الصف الدراسي</label>
<input type="text" id="sGrade">

<label>حالة الرسوم</label>
<select id="sFees">
<option value="غير مسدد">غير مسدد ❌</option>
<option value="مسدد">مسدد ✅</option>
</select>

<label>ملاحظات الإدارة (تظهر للطالب)</label>
<textarea id="sNotes" rows="3"></textarea>

<button class="btn-save" onclick="updateData()">حفظ التعديلات الآن</button>
<a href="students_section.html" class="btn-back">إلغاء والعودة للوحة التحكم</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDuotSqXkOwPrWIAxNC7KCqWlyYonsUIBA",
authDomain: "jil-al-ibda-a.firebaseapp.com",
projectId: "jil-al-ibda-a",
storageBucket: "jil-al-ibda-a.firebasestorage.app",
messagingSenderId: "1057703586286",
appId: "1:1057703586286:web:e581aa576eef32930746ff"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// عند تحميل الصفحة، اجلب رقم الطالب المحفوظ
window.onload = async function() {
const targetID = localStorage.getItem('targetID');
if (targetID) {
document.getElementById('sID').value = targetID;
const docRef = doc(db, "students", targetID);
const docSnap = await getDoc(docRef);
if (docSnap.exists()) {
const data = docSnap.data();
document.getElementById('sName').value = data.studentName || data.fullName || "";
document.getElementById('sGrade').value = data.class || data.currentGrade || "";
document.getElementById('sFees').value = data.paymentStatus || "غير مسدد";
document.getElementById('sNotes').value = data.adminNotes || "";
}
}
};

window.updateData = async function() {
const id = document.getElementById('sID').value;
try {
await updateDoc(doc(db, "students", id), {
studentName: document.getElementById('sName').value,
class: document.getElementById('sGrade').value,
paymentStatus: document.getElementById('sFees').value,
adminNotes: document.getElementById('sNotes').value
});
alert("تم التحديث بنجاح!");
window.location.href = "students_section.html";
} catch (e) {
alert("خطأ في التحديث");
}
};
</script>
</body>
</html>
