<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة بيانات الطالب - جيل الإبداع</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Tajawal', sans-serif; background: #f4f4f4; padding: 20px; direction: rtl; }
.admin-panel { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
h2 { color: #2c3e50; text-align: center; }
label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.9rem; color: #555; }
input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; }
input:focus { border-color: #27ae60; }
.btn-group { display: flex; gap: 10px; margin-top: 20px; }
.btn-save { flex: 2; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
.btn-fetch { flex: 1; padding: 15px; background: #2c3e50; color: white; border: none; border-radius: 8px; cursor: pointer; }
.btn-back { display: block; text-align: center; margin-top: 15px; color: #777; text-decoration: none; font-size: 0.9rem; }
</style>
</head>
<body>

<div class="admin-panel">
<h2>تعديل بيانات الطالب</h2>
<label>رقم هوية الطالب (مفتاح البحث)</label>
<div style="display: flex; gap: 5px;">
<input type="number" id="sID" placeholder="أدخل رقم الهوية">
<button class="btn-fetch" onclick="fetchStudentData()">بحث 🔍</button>
</div>

<label>اسم الطالب</label>
<input type="text" id="sName" placeholder="سيظهر الاسم تلقائياً">

<label>الصف الدراسي</label>
<input type="text" id="sGrade">

<label>حالة الرسوم</label>
<select id="sFees">
<option value="غير مسدد">غير مسدد ❌</option>
<option value="مسدد">مسدد ✅</option>
</select>

<label>ملاحظات الإدارة</label>
<textarea id="sNotes" rows="3"></textarea>

<button class="btn-save" onclick="updateData()">حفظ التعديلات بالسحابة</button>
<a href="students_section.html" class="btn-back">العودة للوحة التحكم</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDuotSqXkOwPrWIAxNC7KCqWlyYonsUIBA",
authDomain: "jil-al-ibda-a.firebaseapp.com",
projectId: "jil-al-ibda-a",
storageBucket: "jil-al-ibda-a.firebasestorage.app",
messagingSenderId: "1057703586286",
appId: "1:1057703586286:web:e581aa576eef32930746ff"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 1. فحص إذا كان هناك رقم هوية مرسل من صفحة الطلاب
window.onload = function() {
const targetID = localStorage.getItem('targetID');
if (targetID) {
document.getElementById('sID').value = targetID;
fetchStudentData();
localStorage.removeItem('targetID');
}
};

// 2. دالة جلب بيانات الطالب من الهوية
window.fetchStudentData = async function() {
const id = document.getElementById('sID').value;
if (!id) return;

const docRef = doc(db, "students", id);
const docSnap = await getDoc(docRef);

if (docSnap.exists()) {
const data = docSnap.data();
document.getElementById('sName').value = data.studentName || data.fullName || "";
document.getElementById('sGrade').value = data.class || data.currentGrade || "";
document.getElementById('sFees').value = data.paymentStatus || "غير مسدد";
document.getElementById('sNotes').value = data.adminNotes || "";
} else {
alert("لم يتم العثور على طالب بهذا الرقم في النظام.");
}
};

// 3. دالة حفظ التعديلات
window.updateData = async function() {
const id = document.getElementById('sID').value;
const name = document.getElementById('sName').value;

if(!id || !name) { alert("أدخل البيانات المطلوبة"); return; }

try {
await setDoc(doc(db, "students", id), {
studentName: name,
class: document.getElementById('sGrade').value,
paymentStatus: document.getElementById('sFees').value,
adminNotes: document.getElementById('sNotes').value,
lastUpdate: serverTimestamp()
}, { merge: true });

alert("تم تحديث بيانات الطالب بنجاح!");
} catch (e) {
alert("خطأ في الحفظ، تأكد من الـ Rules");
}
};
</script>
</body>
</html>
